<!doctype html>
<html lang="en">
<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Daily Wins</title>
  <meta name="description" content="Celebrate your day with daily wins. Log what you finished, keep your streak, honour the day's biggest win." />

  <!-- Ask search engines not to index or follow this page. Honoured by Google, Bing, etc. Not a security control. -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />

  <!-- Home-screen / app meta -->
  <meta name="theme-color" content="#AED9E0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Daily Wins" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='84'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FFF7EC'/%3E%3Ctext x='50' y='52' font-size='62' text-anchor='middle' dominant-baseline='central'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:#AED9E0; --surface:#FFFFFF; --ink:#12333A; --soft:#5A7C85;
      --coral:#FF5B41; --gold:#FFB02E; --teal:#185F6D; --line:#DCE8EB;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body {
      font-family:'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      color:var(--ink); background:var(--bg); min-height:100vh;
      -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;
    }
    .dw { min-height:100vh; padding:max(22px, env(safe-area-inset-top)) 16px 48px; }
    .dw-wrap { max-width:460px; margin:0 auto; }
    .dw-head { display:flex; align-items:baseline; justify-content:space-between; }
    .dw-title { font-family:'Bricolage Grotesque', system-ui, sans-serif; font-weight:800; font-size:30px; letter-spacing:-0.025em; }
    .dw-date { font-size:13px; color:var(--soft); font-weight:600; }
    .dw-tag { font-size:13.5px; color:var(--soft); margin:2px 0 18px; }

    .dw-hero { background:var(--surface); border:1px solid var(--line); border-radius:26px; padding:22px; box-shadow:0 12px 34px rgba(24,95,109,0.14); }
    .dw-hero-top { display:flex; align-items:center; justify-content:space-between; }
    .dw-streaklabel { font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.09em; color:var(--soft); }
    .dw-best { font-size:12px; font-weight:700; color:var(--coral); background:#FFEDE8; padding:5px 11px; border-radius:999px; }
    .dw-streak { display:flex; align-items:flex-end; gap:10px; margin-top:8px; }
    .dw-flame { font-size:38px; line-height:1; padding-bottom:6px; }
    .dw-streaknum { font-family:'Bricolage Grotesque'; font-weight:800; font-size:60px; line-height:0.9; letter-spacing:-0.04em; }
    .dw-streakunit { font-size:15px; font-weight:600; color:var(--soft); padding-bottom:9px; }
    .dw-substat { font-size:13px; font-weight:600; color:var(--soft); margin-top:8px; }

    .dw-progress { display:flex; align-items:center; gap:12px; margin-top:18px; padding-top:16px; border-top:1px solid var(--line); }
    .dw-dots { display:flex; gap:7px; }
    .dw-dot { width:22px; height:22px; border-radius:50%; border:2px solid var(--line); transition:background .25s,border-color .25s,transform .25s; }
    .dw-dot.on { background:var(--teal); border-color:var(--teal); }
    .dw-dot.full { background:var(--teal); border-color:var(--teal); transform:scale(1.06); }
    .dw-progress-text { font-size:13.5px; font-weight:600; color:var(--soft); }
    .dw-progress-text strong { color:var(--ink); }

    .dw-add { display:flex; gap:8px; margin-top:18px; }
    .dw-input { flex:1; min-width:0; border:1.5px solid var(--line); background:#FFFFFF; border-radius:14px; padding:13px 14px; font:inherit; font-size:16px; color:var(--ink); outline:none; transition:border-color .2s; }
    .dw-input:focus { border-color:var(--coral); }
    .dw-input::placeholder { color:#A6BFC5; }
    .dw-addbtn { border:none; background:var(--coral); color:#fff; font:inherit; font-weight:700; font-size:15px; padding:0 20px; border-radius:14px; cursor:pointer; transition:transform .12s,background .2s; }
    .dw-addbtn:active { transform:scale(0.95); }
    .dw-addbtn:disabled { background:#F3D9D2; cursor:default; }

    .dw-section-h { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--soft); margin:26px 0 12px; }
    .dw-wins { display:flex; flex-direction:column; gap:8px; }
    .dw-win { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px 14px; animation:pop .28s ease; }
    .dw-win.is-best { background:linear-gradient(100deg,#FFF6E6,#FFFFFF); border-color:#FAD79A; box-shadow:0 4px 14px rgba(255,176,46,0.16); }
    .dw-check { width:24px; height:24px; border-radius:50%; background:var(--teal); color:#fff; display:flex; align-items:center; justify-content:center; flex:0 0 auto; font-size:14px; font-weight:800; }
    .dw-wintext { flex:1; font-size:15px; font-weight:500; word-break:break-word; }
    .dw-crown { flex:0 0 auto; width:30px; height:30px; border-radius:50%; border:none; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; background:#E6EFF1; filter:grayscale(1) opacity(0.5); transition:filter .15s,background .15s,transform .12s; }
    .dw-crown:active { transform:scale(0.9); }
    .dw-crown.on { background:linear-gradient(150deg,var(--gold),var(--coral)); filter:none; box-shadow:0 3px 10px rgba(255,91,65,0.3); }
    .dw-del { border:none; background:none; color:#A6BFC5; cursor:pointer; font-size:20px; line-height:1; padding:2px 4px; border-radius:8px; }
    .dw-del:active { color:var(--coral); }
    .dw-empty { text-align:center; color:var(--soft); font-size:14.5px; padding:22px 14px; border:1.5px dashed #8FB9C2; border-radius:16px; background:rgba(255,255,255,0.35); }

    .dw-week { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; }
    .dw-day { display:flex; flex-direction:column; align-items:center; gap:7px; }
    .dw-dl { font-size:11px; font-weight:700; color:var(--soft); }
    .dw-tile { width:100%; aspect-ratio:1; border-radius:14px; display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque'; font-weight:800; font-size:18px; border:1.5px solid var(--line); background:var(--surface); color:var(--ink); position:relative; }
    .dw-tile.partial { background:#FFF3DF; border-color:#FCE3B8; color:#C98A14; }
    .dw-tile.hit { background:linear-gradient(150deg,var(--gold),var(--coral)); border-color:transparent; color:#fff; box-shadow:0 6px 15px rgba(255,91,65,0.30); }
    .dw-tile.zero { color:#B9CDD2; }
    .dw-tile.today { outline:2.5px solid var(--ink); outline-offset:2px; }
    .dw-tile .star { position:absolute; top:-7px; right:-5px; font-size:13px; }
    .dw-backup { background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px; }
    .dw-backup-note { font-size:12.5px; color:var(--soft); line-height:1.45; margin-bottom:12px; }
    .dw-backup-btns { display:flex; gap:8px; }
    .dw-bbtn { flex:1; border:1.5px solid var(--teal); border-radius:13px; padding:12px 10px; font:inherit; font-weight:700; font-size:14px; cursor:pointer; transition:transform .12s, background .15s; }
    .dw-bbtn.save { background:var(--teal); color:#fff; }
    .dw-bbtn.restore { background:none; color:var(--teal); }
    .dw-bbtn:active { transform:scale(0.97); }
    .dw-backup-msg { font-size:12.5px; font-weight:600; margin-top:10px; min-height:0; }
    .dw-backup-msg.ok { color:var(--teal); }
    .dw-backup-msg.err { color:var(--coral); }

    .dw-foot { text-align:center; font-size:11.5px; color:#5A7C85; margin-top:22px; }

    .dw-confetti { position:fixed; inset:0; pointer-events:none; z-index:50; }
    .dw-confetti span { position:absolute; top:-12px; width:9px; height:14px; border-radius:2px; animation:fall 1.5s ease-in forwards; }

    .dw-overlay { position:fixed; inset:0; background:rgba(42,35,32,0.46); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:20px; z-index:60; animation:fadein .2s ease; }
    .dw-modal { background:var(--surface); border-radius:24px; padding:24px 22px; width:100%; max-width:380px; box-shadow:0 24px 60px rgba(0,0,0,0.28); animation:scalein .26s cubic-bezier(.2,.8,.3,1); }
    .dw-modal-eyebrow { font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--coral); }
    .dw-modal-title { font-family:'Bricolage Grotesque', sans-serif; font-weight:800; font-size:21px; letter-spacing:-0.02em; margin:6px 0 18px; line-height:1.15; }
    .dw-pick-list { display:flex; flex-direction:column; gap:9px; }
    .dw-pick { display:flex; align-items:center; gap:11px; text-align:left; width:100%; border:1.5px solid var(--line); background:#F8FBFC; border-radius:14px; padding:14px; font:inherit; font-size:15px; font-weight:600; color:var(--ink); cursor:pointer; transition:border-color .15s,transform .12s,background .15s; }
    .dw-pick:active { transform:scale(0.98); border-color:var(--gold); background:#FFF8EC; }
    .dw-pick-crown { font-size:18px; flex:0 0 auto; }
    .dw-skip { margin-top:14px; width:100%; border:none; background:none; color:var(--soft); font:inherit; font-size:13.5px; font-weight:600; cursor:pointer; padding:6px; }

    .dw-quote { text-align:center; padding:30px 24px 24px; }
    .dw-quote-win { display:inline-flex; align-items:center; gap:6px; background:#FFF1DC; color:#B8780C; font-size:13px; font-weight:700; padding:6px 14px; border-radius:999px; margin-bottom:18px; max-width:100%; }
    .dw-quote-text { font-family:'Bricolage Grotesque', sans-serif; font-weight:600; font-size:21px; line-height:1.34; letter-spacing:-0.01em; color:var(--ink); }
    .dw-quote-actions { display:flex; gap:10px; margin-top:24px; }
    .dw-ghost { flex:0 0 auto; border:1.5px solid var(--line); background:none; color:var(--soft); font:inherit; font-weight:700; font-size:14px; padding:12px 16px; border-radius:13px; cursor:pointer; }
    .dw-primary { flex:1; border:none; background:var(--coral); color:#fff; font:inherit; font-weight:700; font-size:15px; padding:12px; border-radius:13px; cursor:pointer; transition:transform .12s; }
    .dw-primary:active { transform:scale(0.97); }

    @keyframes pop { from { opacity:0; transform:translateY(-4px) scale(0.98); } to { opacity:1; transform:none; } }
    @keyframes fall { to { transform:translateY(105vh) rotate(360deg); opacity:0; } }
    @keyframes fadein { from { opacity:0; } to { opacity:1; } }
    @keyframes scalein { from { opacity:0; transform:translateY(8px) scale(0.96); } to { opacity:1; transform:none; } }
    @media (prefers-reduced-motion: reduce) { *{ animation:none !important; transition:none !important; } .dw-confetti{ display:none; } }
  </style>
</head>
<body>
  <div class="dw" id="root">
    <div class="dw-wrap">
      <div class="dw-head">
        <div class="dw-title">Daily Wins</div>
        <div class="dw-date" id="date"></div>
      </div>
      <div class="dw-tag">Celebrate your day with daily wins</div>

      <div class="dw-hero">
        <div class="dw-hero-top">
          <span class="dw-streaklabel">Current streak</span>
          <span class="dw-best" id="best">Best &middot; 0</span>
        </div>
        <div class="dw-streak">
          <span class="dw-flame" id="flame">&#128293;</span>
          <span class="dw-streaknum" id="streaknum">0</span>
          <span class="dw-streakunit" id="streakunit">days</span>
        </div>
        <div class="dw-substat" id="substat">0 wins this week</div>
        <div class="dw-progress">
          <div class="dw-dots" id="dots"></div>
          <span class="dw-progress-text" id="progresstext"></span>
        </div>
      </div>

      <div class="dw-add">
        <input class="dw-input" id="input" placeholder="What did you finish?" aria-label="Add a win" autocomplete="off" />
        <button class="dw-addbtn" id="addbtn" disabled>Add</button>
      </div>

      <div class="dw-section-h">Today's wins</div>
      <div id="todaywrap"></div>

      <div class="dw-section-h">This week</div>
      <div class="dw-week" id="week"></div>

      <div class="dw-section-h">Log My Wins</div>
      <div class="dw-backup">
        <div class="dw-backup-note">Keep a copy of your wins. Clearing your browser data will erase them otherwise.</div>
        <div class="dw-backup-btns">
          <button class="dw-bbtn save" id="savebtn">&#11015;&nbsp; Save a copy</button>
          <button class="dw-bbtn restore" id="restorebtn">&#11014;&nbsp; Restore</button>
        </div>
        <input type="file" id="fileinput" accept="application/json,.json" hidden />
        <div class="dw-backup-msg" id="backupmsg" role="status"></div>
      </div>

      <div class="dw-foot">Saved on this device.</div>
    </div>
  </div>

  <script>
    "use strict";
    var STORAGE_KEY = "daily-wins:data";
    var TARGET = 3;
    var WD = ["S","M","T","W","T","F","S"];
    var COLORS = ["#FF5B41","#FFB02E","#12B886","#7C5CFF","#FF8FB1"];

    var AFFIRMATIONS = [
      "You showed up and you tried, and trying is the bravest thing a person does all day.",
      "You are loved. Not for the list you finished, but for the heart you brought to it.",
      "Look what you made happen today. You're doing far better than you give yourself credit for.",
      "The effort you can't always see in yourself is real, and it matters. Keep going, gently.",
      "You are enough exactly as you are, and still you keep growing. That's a rare kind of strength.",
      "Someone in this world is better off because you're in it. Today proved it again.",
      "Hard days and good days both count. You kept moving. That's love in action.",
      "You're allowed to be proud of this. You earned it the honest way, by trying.",
      "Be as kind to yourself as you'd be to someone you love. You deserve that, today especially.",
      "Your worth was never up for debate. The wins are a bonus on top of an already-good person.",
      "You carried more than anyone saw, and you still got here. That's quiet, real courage.",
      "Whatever today asked of you, you answered. You are trying so hard, and you are so loved.",
      "Rest is earned, pride is allowed, and you are deeply, genuinely loved.",
      "This is proof: you care, you show up, you matter. Hold onto that tonight."
    ];
    function pickAffirmation(exclude) {
      var a;
      do { a = AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)]; }
      while (a === exclude && AFFIRMATIONS.length > 1);
      return a;
    }

    function byId(id) { return document.getElementById(id); }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
      });
    }
    function uid() {
      return (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
    }
    function dateKey(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + day;
    }
    function diffDays(a, b) {
      return Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000);
    }
    function qualifies(w, k) { return (w[k] ? w[k].length : 0) >= TARGET; }
    function currentStreak(w) {
      var cursor = new Date();
      if (!qualifies(w, dateKey(cursor))) cursor.setDate(cursor.getDate() - 1);
      var streak = 0;
      while (qualifies(w, dateKey(cursor))) { streak++; cursor.setDate(cursor.getDate() - 1); }
      return streak;
    }
    function bestStreak(w) {
      var keys = Object.keys(w).filter(function (k) { return w[k].length >= TARGET; }).sort();
      var best = 0, run = 0, prev = null;
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        run = (prev && diffDays(prev, k) === 1) ? run + 1 : 1;
        if (run > best) best = run;
        prev = k;
      }
      return best;
    }

    // ---------- data (your phone's localStorage) ----------
    function load() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          var p = JSON.parse(raw);
          return { winsByDate: p.winsByDate || {}, biggestByDate: p.biggestByDate || {} };
        }
      } catch (e) {}
      return { winsByDate: {}, biggestByDate: {} };
    }
    function persist() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
      catch (e) { console.error("Save failed:", e); }
    }
    var data = load();
    var root = byId("root");

    // ---------- render ----------
    function render() {
      var w = data.winsByDate;
      var tk = dateKey(new Date());
      var todayWins = w[tk] || [];
      var count = todayWins.length;
      var biggestId = data.biggestByDate[tk];
      var streak = currentStreak(w);
      var best = bestStreak(w);

      var week = [], weekTotal = 0;
      for (var i = 6; i >= 0; i--) {
        var d = new Date(); d.setDate(d.getDate() - i);
        var k = dateKey(d);
        var c = w[k] ? w[k].length : 0;
        weekTotal += c;
        week.push({ letter: WD[d.getDay()], count: c, isToday: k === tk });
      }

      byId("date").textContent = new Date().toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short" });
      byId("best").innerHTML = "Best &middot; " + best;
      byId("streaknum").textContent = streak;
      byId("streakunit").textContent = streak === 1 ? "day" : "days";
      byId("flame").style.opacity = streak ? 1 : 0.32;
      byId("substat").textContent = weekTotal + " wins this week";

      byId("dots").innerHTML = [0,1,2].map(function (i) {
        var cls = "dw-dot";
        if (count >= TARGET) cls += " full"; else if (i < count) cls += " on";
        return '<span class="' + cls + '"></span>';
      }).join("");

      byId("progresstext").innerHTML = count >= TARGET
        ? "Streak day locked in &#127881;"
        : "<strong>" + count + "</strong> / " + TARGET + " wins today";

      var tw = byId("todaywrap");
      if (count === 0) {
        tw.innerHTML = '<div class="dw-empty">No wins yet &mdash; what\'s one thing you\'ve finished?</div>';
      } else {
        tw.innerHTML = '<div class="dw-wins">' + todayWins.map(function (win) {
          var isBest = win.id === biggestId;
          var crown = count >= TARGET
            ? '<button class="dw-crown' + (isBest ? " on" : "") + '" data-crown="' + win.id + '" aria-label="' + (isBest ? "Your biggest win" : "Set as biggest win") + '">&#128081;</button>'
            : "";
          return '<div class="dw-win' + (isBest ? " is-best" : "") + '">' +
                 '<span class="dw-check">&#10003;</span>' +
                 '<span class="dw-wintext">' + esc(win.text) + '</span>' +
                 crown +
                 '<button class="dw-del" data-del="' + win.id + '" aria-label="Remove win">&times;</button>' +
                 '</div>';
        }).join("") + '</div>';
      }

      byId("week").innerHTML = week.map(function (d) {
        var state = d.count >= TARGET ? "hit" : d.count > 0 ? "partial" : "zero";
        return '<div class="dw-day"><span class="dw-dl">' + d.letter + '</span>' +
               '<div class="dw-tile ' + state + (d.isToday ? " today" : "") + '">' +
               (d.count > 0 ? d.count : "") +
               (state === "hit" ? '<span class="star">&#9733;</span>' : "") +
               '</div></div>';
      }).join("");
    }

    // ---------- actions ----------
    function addWin() {
      var inp = byId("input");
      var text = inp.value.trim();
      if (!text) return;
      var tk = dateKey(new Date());
      var list = data.winsByDate[tk] || [];
      var crossing = list.length === TARGET - 1;
      var alreadyBest = !!data.biggestByDate[tk];
      var next = list.slice();
      next.push({ id: uid(), text: text });
      data.winsByDate[tk] = next;
      persist(); render();
      inp.value = ""; byId("addbtn").disabled = true; inp.focus();
      if (crossing) { confetti(); if (!alreadyBest) setTimeout(openPicker, 350); }
    }
    function removeWin(id) {
      var tk = dateKey(new Date());
      var list = (data.winsByDate[tk] || []).filter(function (x) { return x.id !== id; });
      if (list.length) data.winsByDate[tk] = list; else delete data.winsByDate[tk];
      if (data.biggestByDate[tk] === id) delete data.biggestByDate[tk];
      persist(); render();
    }
    function chooseBiggest(id) {
      var tk = dateKey(new Date());
      data.biggestByDate[tk] = id;
      persist(); render();
      closeOverlay("pickerOverlay");
      var win = (data.winsByDate[tk] || []).filter(function (x) { return x.id === id; })[0];
      openQuote(win ? win.text : "");
    }

    // ---------- confetti + modals ----------
    function confetti() {
      var c = document.createElement("div");
      c.className = "dw-confetti"; c.setAttribute("aria-hidden", "true");
      for (var i = 0; i < 18; i++) {
        var s = document.createElement("span");
        s.style.left = ((i * 5.5 + 4) % 100) + "%";
        s.style.background = COLORS[i % COLORS.length];
        s.style.animationDelay = ((i % 6) * 0.05) + "s";
        s.style.transform = "rotate(" + (i * 37) + "deg)";
        c.appendChild(s);
      }
      root.appendChild(c);
      setTimeout(function () { c.remove(); }, 1900);
    }
    function closeOverlay(id) { var o = byId(id); if (o) o.remove(); }

    function openPicker() {
      closeOverlay("pickerOverlay");
      var tk = dateKey(new Date());
      var tw = data.winsByDate[tk] || [];
      var ov = document.createElement("div");
      ov.className = "dw-overlay"; ov.id = "pickerOverlay";
      ov.innerHTML =
        '<div class="dw-modal">' +
          '<div class="dw-modal-eyebrow">Streak locked in &#127881;</div>' +
          '<div class="dw-modal-title">Which was your biggest win today?</div>' +
          '<div class="dw-pick-list">' +
            tw.map(function (w) {
              return '<button class="dw-pick" data-pick="' + w.id + '"><span class="dw-pick-crown">&#128081;</span><span>' + esc(w.text) + '</span></button>';
            }).join("") +
          '</div>' +
          '<button class="dw-skip" data-skip="1">Skip for now</button>' +
        '</div>';
      ov.addEventListener("click", function (e) {
        if (e.target === ov || e.target.getAttribute("data-skip")) { closeOverlay("pickerOverlay"); return; }
        var p = e.target.closest("[data-pick]");
        if (p) chooseBiggest(p.getAttribute("data-pick"));
      });
      root.appendChild(ov);
    }

    function openQuote(winText) {
      closeOverlay("quoteOverlay");
      var current = pickAffirmation();
      var ov = document.createElement("div");
      ov.className = "dw-overlay"; ov.id = "quoteOverlay";
      function html() {
        return '<div class="dw-modal dw-quote">' +
          (winText ? '<div class="dw-quote-win"><span>&#128081;</span> ' + esc(winText) + '</div>' : "") +
          '<div class="dw-quote-text" id="quoteText">' + esc(current) + '</div>' +
          '<div class="dw-quote-actions">' +
            '<button class="dw-ghost" data-another="1">Another</button>' +
            '<button class="dw-primary" data-close="1">Thank you &#128156;</button>' +
          '</div>' +
        '</div>';
      }
      ov.innerHTML = html();
      ov.addEventListener("click", function (e) {
        if (e.target === ov || e.target.getAttribute("data-close")) { closeOverlay("quoteOverlay"); return; }
        if (e.target.getAttribute("data-another")) {
          current = pickAffirmation(current);
          var t = byId("quoteText"); if (t) t.textContent = current;
        }
      });
      root.appendChild(ov);
    }

    // ---------- backup: save a copy / restore ----------
    function flash(msg, ok) {
      var el = byId("backupmsg");
      el.textContent = msg;
      el.className = "dw-backup-msg " + (ok ? "ok" : "err");
      setTimeout(function () { if (el.textContent === msg) { el.textContent = ""; el.className = "dw-backup-msg"; } }, 5000);
    }

    function saveCopy() {
      var total = Object.keys(data.winsByDate).reduce(function (s, k) { return s + data.winsByDate[k].length; }, 0);
      if (total === 0) { flash("Nothing to save yet — log a win first.", false); return; }
      var payload = { app: "daily-wins", version: 1, exportedAt: new Date().toISOString(), winsByDate: data.winsByDate, biggestByDate: data.biggestByDate };
      var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "daily-wins-backup-" + dateKey(new Date()) + ".json";
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      flash("Saved " + total + " win" + (total === 1 ? "" : "s") + " to your downloads.", true);
    }

    // Validate strictly — a malformed file must never overwrite good data.
    function validBackup(p) {
      if (!p || typeof p !== "object") return false;
      if (!p.winsByDate || typeof p.winsByDate !== "object") return false;
      var keys = Object.keys(p.winsByDate);
      for (var i = 0; i < keys.length; i++) {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(keys[i])) return false;
        var list = p.winsByDate[keys[i]];
        if (!Array.isArray(list)) return false;
        for (var j = 0; j < list.length; j++) {
          if (!list[j] || typeof list[j].text !== "string" || typeof list[j].id !== "string") return false;
        }
      }
      return true;
    }

    function restoreFile(file) {
      var reader = new FileReader();
      reader.onload = function () {
        var parsed;
        try { parsed = JSON.parse(reader.result); }
        catch (e) { flash("That file isn't a valid backup.", false); return; }
        if (!validBackup(parsed)) { flash("That file isn't a Daily Wins backup.", false); return; }
        var days = Object.keys(parsed.winsByDate).length;
        var ok = window.confirm(
          "Restore " + days + " day" + (days === 1 ? "" : "s") + " of wins?\n\n" +
          "This replaces everything currently saved on this device."
        );
        if (!ok) { flash("Restore cancelled. Nothing changed.", true); return; }
        data = { winsByDate: parsed.winsByDate, biggestByDate: parsed.biggestByDate || {} };
        persist(); render();
        flash("Restored " + days + " day" + (days === 1 ? "" : "s") + " of wins. 🎉", true);
      };
      reader.onerror = function () { flash("Couldn't read that file.", false); };
      reader.readAsText(file);
    }

    // ---------- wire up ----------
    byId("addbtn").addEventListener("click", addWin);
    byId("input").addEventListener("keydown", function (e) { if (e.key === "Enter") addWin(); });
    byId("input").addEventListener("input", function (e) { byId("addbtn").disabled = !e.target.value.trim(); });
    byId("todaywrap").addEventListener("click", function (e) {
      var del = e.target.closest("[data-del]"); if (del) { removeWin(del.getAttribute("data-del")); return; }
      var cr = e.target.closest("[data-crown]"); if (cr) { chooseBiggest(cr.getAttribute("data-crown")); }
    });

    byId("savebtn").addEventListener("click", saveCopy);
    byId("restorebtn").addEventListener("click", function () { byId("fileinput").click(); });
    byId("fileinput").addEventListener("change", function (e) {
      var f = e.target.files && e.target.files[0];
      if (f) restoreFile(f);
      e.target.value = ""; // allow re-picking the same file
    });

    render();
  </script>
</body>
</html>
